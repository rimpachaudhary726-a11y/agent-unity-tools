name: Request Unity Activation File

# One-time (or renewal) workflow: generates the .alf file you upload to
# https://license.unity3d.com/manual to obtain a Personal license (.ulf).
# Run it manually from the Actions tab, download the activation file
# artifact, complete the manual steps in README.md, then store the
# resulting license as the UNITY_LICENSE secret.
on:
  workflow_dispatch: {}

jobs:
  activation:
    name: Request activation file
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Request manual activation file
        id: getManualLicenseFile
        uses: game-ci/unity-request-activation-file@v2
        with:
          unity-version: 2021.3.2f1

      - name: Upload activation file
        uses: actions/upload-artifact@v4
        with:
          name: unity-activation-file
          path: ${{ steps.getManualLicenseFile.outputs.filePath }}
          retention-days: 7
