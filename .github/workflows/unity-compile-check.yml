name: Unity Compile Check

# Real compile validation. Triggered on every push/PR: restores the Unity
# Library cache, runs EditMode tests via game-ci/unity-test-runner (which
# forces Unity to compile every script first), and surfaces compiler
# errors in the run summary on failure.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  compileCheck:
    name: Compile & EditMode tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-CityBuilder
          restore-keys: |
            Library-

      - name: Run EditMode tests (forces full compile)
        uses: game-ci/unity-test-runner@v4
        id: tests
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          testMode: EditMode
          artifactsPath: test-artifacts
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload test results and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-compile-check-results
          path: |
            test-artifacts
            ${{ steps.tests.outputs.artifactsPath }}
          retention-days: 14

      - name: Extract compiler errors on failure
        if: failure()
        run: |
          echo "### Unity compile check failed" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          find test-artifacts -iname "*.log" -exec grep -h -E "error CS|Compilation failed" {} \; >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
